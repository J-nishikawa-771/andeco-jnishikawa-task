# claude.yml
#
# Claude Code Action workflow — triggered when "@claude" appears in an Issue comment.
#
# IMPORTANT: Before this workflow works, you must complete ALL of the following:
#
#   1. Register ANTHROPIC_API_KEY in GitHub Actions Secrets:
#      Repository Settings > Secrets and variables > Actions > New repository secret
#      Name: ANTHROPIC_API_KEY
#      Value: your Anthropic API key
#
#   2. Install the Claude GitHub App and grant it access to this repository:
#      https://github.com/apps/claude
#      The app requires: Issues (read/write), Pull Requests (read/write), Contents (read/write)
#
#   3. This workflow file MUST exist on the default branch (main) to be triggered.
#
#   4. This is a template only — Secrets configuration is NOT done here.
#      Complete steps 1–3 before expecting @claude to respond.

name: Claude Code Action

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude:
    # Only run when the comment contains "@claude"
    if: contains(github.event.comment.body, '@claude')
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Action
        uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Optional: restrict which GitHub users can trigger Claude
          # allowed_users: "J-nishikawa-771"
